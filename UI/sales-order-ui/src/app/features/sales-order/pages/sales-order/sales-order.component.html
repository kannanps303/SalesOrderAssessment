<div class="container py-5">

    <div class="card sales-card border-0">

        <div class="card-header sales-header">
            <h4 class="mb-0">
                <i class="bi bi-cart-check me-2"></i>
                Sales Order Entry
            </h4>
        </div>

        <div class="card-body p-4">

            <form [formGroup]="salesOrderForm">

                <!-- Header Section -->
                <div class="row align-items-center">

                    <div class="col-lg-6 d-flex gap-2 align-items-center">

                        <label class="col-form-label">Vendor Code</label>

                        <select class="form-select" formControlName="vendorCode" (change)="onVendorChange()">

                            <option value="">Select Vendor</option>

                            <option *ngFor="let vendor of vendors" [value]="vendor.code">

                                {{ vendor.code }}

                            </option>

                        </select>

                        <label class="col-form-label">Vendor Name</label>

                        <input type="text" class="form-control" formControlName="vendorName" readonly>

                    </div>
                    <div class="col-lg-6 d-flex gap-2">
                        <label class="col-form-label">Document No</label>
                        <input type="text" class="form-control" formControlName="docNo">
                        <br>
                        <label class="col-form-label">Document Date</label>
                        <input type="date" class="form-control" formControlName="docDate">
                    </div>

                </div>
                <!-- Item Grid -->
                <div class="table-responsive">

                    <table class="table table-hover align-middle custom-table">

                        <thead>
                            <tr>
                                <th>Item Code</th>
                                <th>Item Name</th>
                                <th>UOM</th>
                                <th width="150">Quantity</th>
                                <th width="120">Action</th>
                            </tr>
                        </thead>

                        <tbody formArrayName="items">

                            <tr *ngFor="let item of items.controls; let i = index" [formGroupName]="i">

                                <td>
                                    <select class="form-select" formControlName="itemId" (change)="onItemChange(i)">

                                        <option value="">
                                            Select Item
                                        </option>

                                        <option *ngFor="let itm of itemsMaster" [value]="itm.id">

                                            {{ itm.code }}

                                        </option>

                                    </select>
                                </td>

                                <td>
                                    <input class="form-control" formControlName="itemName" readonly>
                                </td>

                                <td>
                                    <input class="form-control" formControlName="uom" readonly>
                                </td>

                                <td>
                                    <input type="number" class="form-control" formControlName="quantity">
                                </td>

                                <td class="text-center">

                                    <button type="button" class="btn btn-outline-danger btn-sm" (click)="removeRow(i)">
                                        Remove
                                    </button>

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

                <!-- Buttons -->
                <div class="d-flex justify-content-end gap-3 mt-4">

                    <button type="button" class="btn btn-add" (click)="addRow()">

                        + Add Item

                    </button>

                    <button type="button" class="btn btn-save" (click)="save()">

                        Save Order

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>
